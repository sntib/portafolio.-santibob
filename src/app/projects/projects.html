<main>

  <section>

    <h2>Mis Proyectos</h2>

    <div class="projects-grid">

      <article
        class="card"
        *ngFor="let proyecto of projects">

        <h3>{{ proyecto.titulo }}</h3>

        <p>{{ proyecto.descripcion }}</p>

        <span class="tech">
          {{ proyecto.tecnologias }}
        </span>

      </article>

    </div>

  </section>

</main>
